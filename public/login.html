<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexAI — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Syne:wght@400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a08; --surface: #111110; --surface2: #1a1a18; --border: #2a2a26;
      --gold: #c9a84c; --gold-light: #e8c97a; --text: #e8e8e0; --text-muted: #888880;
      --green: #52c87a; --red: #e05252;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .auth-container { width: 100%; max-width: 480px; }
    .auth-logo { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 600; color: var(--gold); text-align: center; margin-bottom: 0.3rem; }
    .auth-logo-sub { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); text-align: center; margin-bottom: 2.5rem; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); padding: 2.5rem; }
    .auth-title { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 400; color: var(--text); margin-bottom: 0.4rem; }
    .auth-subtitle { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 2rem; line-height: 1.5; }
    .form-group { margin-bottom: 1.25rem; }
    .form-label { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.4rem; display: block; }
    .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'Syne', sans-serif; font-size: 0.9rem; padding: 0.75rem 1rem; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--gold); }
    .form-input::placeholder { color: var(--text-muted); opacity: 0.5; }
    .submit-btn { width: 100%; padding: 1rem; background: var(--gold); color: #0a0a08; border: none; font-family: 'DM Mono', monospace; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; margin-top: 0.5rem; }
    .submit-btn:hover { background: var(--gold-light); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-switch { text-align: center; margin-top: 1.5rem; font-size: 0.82rem; color: var(--text-muted); }
    .auth-switch a { color: var(--gold); text-decoration: none; }
    .error-msg { display: none; padding: 0.75rem 1rem; background: rgba(224,82,82,0.08); border: 1px solid var(--red); color: var(--red); font-family: 'DM Mono', monospace; font-size: 0.72rem; margin-bottom: 1rem; }
    .error-msg.visible { display: block; }
    .spinner-inline { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #000; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="auth-container">
  <div class="auth-logo">LexAI</div>
  <div class="auth-logo-sub">Contract Intelligence</div>
  <div class="auth-card">
    <div class="auth-title">Welcome back</div>
    <div class="auth-subtitle">Sign in to your LexAI account to continue.</div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" id="loginEmail" type="email" placeholder="your@email.com" onkeydown="if(event.key==='Enter') login()" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" id="loginPassword" type="password" placeholder="Your password" onkeydown="if(event.key==='Enter') login()" />
    </div>
    <button class="submit-btn" id="loginBtn" onclick="login()">Sign In</button>
    <div class="auth-switch">Don't have an account? <a href="/signup">Sign up</a></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://ljgykrqlndtsmnfzioho.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_YOLEJpJM7ehjtx14Dx5Mxg_BTIt_hRL';

  // Check if already logged in
  const token = localStorage.getItem('lexai_token');
  if (token) window.location.href = '/dashboard';

  async function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const errorEl = document.getElementById('errorMsg');
    errorEl.classList.remove('visible');

    if (!email || !password) { errorEl.textContent = 'Please enter your email and password.'; errorEl.classList.add('visible'); return; }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-inline"></span> Signing in...';

    const response = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
      body: JSON.stringify({ email, password })
    });

    const data = await response.json();

    if (data.error || !data.access_token) {
      errorEl.textContent = data.error_description || 'Invalid email or password.';
      errorEl.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }

    // Get user profile to check subscription
    const profileRes = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${data.user.id}&select=*`, {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${data.access_token}` }
    });

    const profiles = await profileRes.json();
    const profile = profiles[0];

    localStorage.setItem('lexai_token', data.access_token);
    localStorage.setItem('lexai_user', JSON.stringify({
      id: data.user.id,
      email: data.user.email,
      full_name: profile?.full_name || '',
      subscription_status: profile?.subscription_status || 'inactive',
      is_founder: profile?.is_founder || false
    }));

    // Check if subscription is active
    if (profile?.subscription_status === 'active' || profile?.is_founder) {
      window.location.href = '/dashboard';
    } else {
      window.location.href = '/signup?step=payment';
    }
  }
</script>
</body>
</html>
