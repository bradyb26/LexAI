<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexAI — Payment Successful</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=Syne:wght@400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a08; --surface: #111110; --border: #2a2a26; --gold: #c9a84c; --gold-light: #e8c97a; --text: #e8e8e0; --text-muted: #888880; --green: #52c87a; }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .container { width: 100%; max-width: 480px; text-align: center; }
    .success-icon { font-size: 3rem; margin-bottom: 1.5rem; animation: pop 0.5s ease; }
    @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 600; color: var(--gold); margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-top: 2px solid var(--green); padding: 2.5rem; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 400; color: var(--text); margin-bottom: 0.75rem; }
    p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 2rem; }
    .btn { display: block; width: 100%; padding: 1rem; background: var(--gold); color: #0a0a08; border: none; font-family: 'DM Mono', monospace; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; text-decoration: none; text-align: center; }
    .btn:hover { background: var(--gold-light); }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">LexAI</div>
  <div class="card" id="loadingCard">
    <div class="spinner"></div>
    <p>Activating your account...</p>
  </div>
  <div class="card" id="successCard" style="display:none">
    <div class="success-icon">✓</div>
    <h1>You're all set!</h1>
    <p>Your LexAI subscription is now active. Welcome to the platform — start analyzing contracts right away.</p>
    <a href="/dashboard" class="btn">Go to Dashboard →</a>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://ljgykrqlndtsmnfzioho.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_YOLEJpJM7ehjtx14Dx5Mxg_BTIt_hRL';

  async function activateAccount() {
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('user_id');
    const token = localStorage.getItem('lexai_token');

    if (userId && token) {
      // Update subscription status
      await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ subscription_status: 'active' })
      });

      // Update local storage
      const user = JSON.parse(localStorage.getItem('lexai_user') || '{}');
      user.subscription_status = 'active';
      localStorage.setItem('lexai_user', JSON.stringify(user));
    }

    setTimeout(() => {
      document.getElementById('loadingCard').style.display = 'none';
      document.getElementById('successCard').style.display = 'block';
    }, 1500);
  }

  activateAccount();
</script>
</body>
</html>
